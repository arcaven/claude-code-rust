name: Agent SDK

on:
  push:
    branches: [main]
    paths:
      - "agent-sdk/**"
      - ".github/workflows/agent-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "agent-sdk/**"
      - ".github/workflows/agent-sdk.yml"
  workflow_dispatch:

jobs:
  check:
    name: Check agent-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: agent-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run raw audit report
        run: npm run audit:raw
        continue-on-error: true

      - name: Run direct dependency audit gate
        run: npm run audit

      - name: Run lint
        run: npm run lint

      - name: Run Knip
        run: npm run knip
